name: Release Package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Validate Tag Matches Package Version
        id: package
        uses: askrjs/actions/actions/validate-package-version@ed124344f103ec17a3ff86013bcdedf2d87e92c4
        with:
          package-json-path: package.json
          tag: ${{ env.RELEASE_TAG }}

      - name: Create GitHub Release
        uses: askrjs/actions/actions/create-release@ed124344f103ec17a3ff86013bcdedf2d87e92c4
        with:
          tag: ${{ steps.package.outputs.tag }}
          body: Automated release for ${{ steps.package.outputs.normalized_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
