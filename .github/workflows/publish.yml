name: Publish Package

on:
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    needs: ci
    uses: askrjs/actions/.github/workflows/publish-package.yml@614b9e344983ad2100563c5f36f94d774d3ba6bd
    with:
      install-playwright: true
    permissions:
      contents: write
      id-token: write
      packages: read
