name: CI

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths:
      - '.github/**'
      - 'checks/**'
      - 'test-d/**'
      - 'test-utils/**'
      - 'tooling/**'
      - 'benches/**'
      - 'src/**'
      - 'tests/**'
      - '*.json'
      - '*.ts'
      - '*.js'
      - '.gitattributes'
      - '.gitignore'
      - '.npmignore'
      - '.npmrc'
      - '.prettierignore'
  pull_request:
    branches: [main]
    paths:
      - '.github/**'
      - 'checks/**'
      - 'test-d/**'
      - 'test-utils/**'
      - 'tooling/**'
      - 'benches/**'
      - 'src/**'
      - 'tests/**'
      - '*.json'
      - '*.ts'
      - '*.js'
      - '.gitattributes'
      - '.gitignore'
      - '.npmignore'
      - '.npmrc'
      - '.prettierignore'

permissions:
  contents: read

jobs:
  ci:
    name: Release Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
